<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | Catalyst CA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <div class="w-full bg-white shadow-sm p-4 flex justify-between items-center absolute top-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-chart-pie text-2xl text-blue-700"></i>
            <span class="text-xl font-bold text-slate-900 tracking-tight">Catalyst<span class="text-blue-700"> CA</span></span>
        </div>
        <a href="index.html" class="text-sm font-semibold text-slate-600 hover:text-blue-700 transition flex items-center gap-2">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <div class="flex-grow flex items-center justify-center p-4 mt-16">
        <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            
            <div class="flex border-b border-slate-200">
                <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-4 text-center font-bold text-blue-700 border-b-2 border-blue-700 transition">Sign In</button>
                <button id="tabSignup" onclick="switchTab('signup')" class="flex-1 py-4 text-center font-bold text-slate-400 hover:text-slate-600 border-b-2 border-transparent transition">Create Account</button>
            </div>

            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 id="formTitle" class="text-2xl font-extrabold text-slate-800">Welcome Back</h2>
                    <p id="formSubtitle" class="text-sm text-slate-500 mt-1">Access your secure billing portal</p>
                </div>

                <form id="authForm" onsubmit="handleAuth(event)">
                    <div id="signupFields" class="hidden space-y-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Company / Individual Name</label>
                            <input type="text" id="clientName" placeholder="e.g. ABC Enterprises" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">GSTIN (Optional)</label>
                            <input type="text" id="clientGST" placeholder="22AAAAA0000A1Z5" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition uppercase">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Registered Address</label>
                            <textarea id="clientAddress" placeholder="Full business address..." rows="2" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"></textarea>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                            <input type="email" id="email" required placeholder="client@example.com" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-sm font-medium text-slate-700">Password</label>
                                <a href="#" class="text-xs text-blue-600 hover:underline">Forgot password?</a>
                            </div>
                            <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full mt-8 bg-blue-700 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 transition shadow-lg flex justify-center items-center gap-2">
                        <i class="fa-solid fa-lock"></i> Secure Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="loadingModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl text-center">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
            <h3 class="text-lg font-bold text-slate-800">Processing...</h3>
            <p class="text-sm text-slate-500 mt-1">Please wait...</p>
        </div>
    </div>

    <script>
        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            const tabLogin = document.getElementById('tabLogin');
            const tabSignup = document.getElementById('tabSignup');
            const signupFields = document.getElementById('signupFields');
            const formTitle = document.getElementById('formTitle');
            const formSubtitle = document.getElementById('formSubtitle');
            const submitBtn = document.getElementById('submitBtn');

            document.getElementById('authForm').reset();

            if (mode === 'login') {
                tabLogin.className = "flex-1 py-4 text-center font-bold text-blue-700 border-b-2 border-blue-700 transition";
                tabSignup.className = "flex-1 py-4 text-center font-bold text-slate-400 hover:text-slate-600 border-b-2 border-transparent transition";
                signupFields.classList.add('hidden');
                formTitle.innerText = "Welcome Back";
                formSubtitle.innerText = "Access your secure billing portal";
                submitBtn.innerHTML = '<i class="fa-solid fa-lock"></i> Secure Sign In';
                document.getElementById('clientName').removeAttribute('required');
                document.getElementById('clientAddress').removeAttribute('required');
            } else {
                tabSignup.className = "flex-1 py-4 text-center font-bold text-blue-700 border-b-2 border-blue-700 transition";
                tabLogin.className = "flex-1 py-4 text-center font-bold text-slate-400 hover:text-slate-600 border-b-2 border-transparent transition";
                signupFields.classList.remove('hidden');
                formTitle.innerText = "Create Account";
                formSubtitle.innerText = "Start generating GST bills instantly";
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Register Now';
                document.getElementById('clientName').setAttribute('required', 'true');
                document.getElementById('clientAddress').setAttribute('required', 'true');
            }
        }

        async function handleAuth(event) {
            event.preventDefault(); 
            
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            
            document.getElementById('loadingModal').classList.remove('hidden');

            if(currentMode === 'signup') {
                let companyName = document.getElementById('clientName').value;
                let gstin = document.getElementById('clientGST').value.toUpperCase();
                let address = document.getElementById('clientAddress').value;

                try {
                    let response = await fetch('http://localhost:3000/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ companyName, gstin, address, email, password })
                    });
                    
                    let result = await response.json();
                    document.getElementById('loadingModal').classList.add('hidden');
                    
                    if(response.ok) {
                        alert("✅ Registration Successful!\n\nAn activation link has been sent to your email. Please check your inbox (and spam folder) and click the link to activate your account.");
                        switchTab('login');
                    } else {
                        alert("❌ " + result.message);
                    }
                } catch (error) {
                    document.getElementById('loadingModal').classList.add('hidden');
                    alert("Unable to connect to the backend server.");
                }
            } else {
                try {
                    let response = await fetch('http://localhost:3000/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    let result = await response.json();
                    document.getElementById('loadingModal').classList.add('hidden');
                    
                    if(response.ok) {
                        localStorage.setItem('activeClientName', result.companyName);
                        localStorage.setItem('activeClientGST', result.gstin || '');
                        localStorage.setItem('activeClientAddress', result.address || ''); // Address saved here
                        window.location.href = "billing.html";
                    } else {
                        alert("❌ " + result.message);
                    }
                } catch (error) {
                    document.getElementById('loadingModal').classList.add('hidden');
                    alert("Unable to connect to the backend server.");
                }
            }
        }
    </script>
</body>
</html>
